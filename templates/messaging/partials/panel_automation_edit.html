<form hx-post="/m/messaging/automations/{{ automation.id }}/edit"
      hx-target="#automations-list"
      @htmx:after-request="closePanel()">
    {{ csrf_input() }}

    <div class="side-sheet-header">
        <h2 class="side-sheet-title">{{ _("Edit Automation") }}</h2>
        <button type="button" class="side-sheet-close" @click="closePanel()">
            {{ icon("close-outline") }}
        </button>
    </div>

    <div class="side-sheet-body">
        <div class="form-group">
            <label class="form-group-label">{{ _("Name") }} *</label>
            <input type="text" name="name" class="input" required value="{{ automation.name }}">
        </div>

        <div class="form-group">
            <label class="form-group-label">{{ _("Description") }}</label>
            <textarea name="description" class="textarea" rows="2">{{ automation.description }}</textarea>
        </div>

        <div class="form-group">
            <label class="form-group-label">{{ _("Trigger") }} *</label>
            <select name="trigger" class="select" required>
                {% for value, label in trigger_choices %}
                <option value="{{ value }}" {{ 'selected' if automation.trigger == value }}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-group-label">{{ _("Channel") }}</label>
            <select name="channel" class="select">
                <option value="email" {{ 'selected' if automation.channel == 'email' }}>{{ _("Email") }}</option>
                <option value="whatsapp" {{ 'selected' if automation.channel == 'whatsapp' }}>{{ _("WhatsApp") }}</option>
                <option value="sms" {{ 'selected' if automation.channel == 'sms' }}>{{ _("SMS") }}</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-group-label">{{ _("Template") }}</label>
            <select name="template" class="select">
                <option value="">{{ _("None") }}</option>
                {% for template in templates %}
                <option value="{{ template.id }}" {{ 'selected' if automation.template_id == template.id }}>{{ template.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-group-label">{{ _("Delay (hours)") }}</label>
            <input type="number" name="delay_hours" class="input" value="{{ automation.delay_hours }}" min="0">
        </div>

        <div class="form-group">
            <label class="form-group-label">{{ _("Active") }}</label>
            <input type="checkbox" name="is_active" class="toggle" {{ 'checked' if automation.is_active }}>
        </div>

        {% if automation.total_sent > 0 %}
        <div class="callout callout-info mt-4">
            <div class="callout-content">
                <p class="callout-text">{{ _("Total sent:") }} {{ automation.total_sent }}</p>
                {% if automation.last_triggered_at %}
                <p class="callout-text text-xs">{{ _("Last triggered:") }} {{ automation.last_triggered_at|dateformat("d/m/Y H:i") }}</p>
                {% endif %}
            </div>
        </div>
        {% endif %}
    </div>

    <div class="side-sheet-footer">
        <button type="button" class="btn btn-ghost btn-sm" @click="closePanel()">{{ _("Cancel") }}</button>
        <button type="submit" class="btn btn-sm color-primary">
            {{ icon("save-outline") }}
            {{ _("Save") }}
        </button>
    </div>
</form>
